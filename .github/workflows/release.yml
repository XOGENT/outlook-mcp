name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install DXT CLI
        run: npm install -g @anthropic-ai/dxt

      - name: Build DXT package
        run: dxt pack . outlook-mcp.dxt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t outlook-mcp:${{ steps.version.outputs.VERSION }} .

      - name: Save Docker image tarball
        run: docker save outlook-mcp:${{ steps.version.outputs.VERSION }} | gzip > outlook-mcp-docker.tar.gz

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          sha256sum outlook-mcp.dxt > outlook-mcp.dxt.sha256
          HASH=$(cut -d ' ' -f 1 outlook-mcp.dxt.sha256)
          echo "SHA256=$HASH" >> $GITHUB_OUTPUT
          echo "SHA256 checksum: $HASH"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Outlook MCP ${{ steps.version.outputs.VERSION }}
          body: |
            ## Outlook MCP ${{ steps.version.outputs.VERSION }}
            
            ### Installation
            1. Download `outlook-mcp.dxt` below
            2. In Claude Desktop: **Settings** → **Extensions** → **Install from file**
            3. Call `outlook_connect_account` to sign in (or enter BYO Azure credentials in Advanced settings)
            
            ### Docker (Headless)
            ```bash
            docker load < outlook-mcp-docker.tar.gz
            docker run -i --rm -v outlook-mcp-data:/data -e MCP_OUTLOOK_HEADLESS=true outlook-mcp:${{ steps.version.outputs.VERSION }}
            ```
            See [docs/docker.md](https://github.com/XenoXilus/outlook-mcp/blob/main/docs/docker.md).
            
            ### SHA256 Checksum
            ```
            ${{ steps.checksum.outputs.SHA256 }}  outlook-mcp.dxt
            ```
            
            ### Verify Download (Optional)
            ```bash
            echo "${{ steps.checksum.outputs.SHA256 }}  outlook-mcp.dxt" | sha256sum -c
            ```
            
            See [README](https://github.com/XenoXilus/outlook-mcp#readme) for Azure setup instructions.
          files: |
            outlook-mcp.dxt
            outlook-mcp-docker.tar.gz
          draft: false
          prerelease: false
